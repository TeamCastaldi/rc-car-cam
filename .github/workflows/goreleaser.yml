name: goreleaser

on:
  push:
    tags:
      - "backend/v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Strip backend/ prefix for GoReleaser's tag parsing
        run: echo "GORELEASER_CURRENT_TAG=${GITHUB_REF_NAME#backend/}" >> "$GITHUB_ENV"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
