version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"

  # The init-project.prompt.md workflow (.github/prompts/init-project.prompt.md)
  # adds one block per stack it scaffolds (e.g. "pip" for a backend/ folder,
  # "npm" for a frontend/ folder) — see
  # https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
